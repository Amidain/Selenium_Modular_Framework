# Default global configuration properties
browser=chrome
base.url=https://automationexercise.com/
grid.url=http://localhost:4444/wd/hub
headless=false
is.remote.run=false
docker=false
insert.db.records=false
ui.autoscroll.enabled=true
## Retry strategy configurations
retry.count=2
retry.delay.millis=1000
# Timeout & waiting configurations
default.timeout.seconds=15
short.timeout.seconds=5
default.polling.millis=500
short.polling.millis=200
# Reporting configurations
reporting.screenshots.on.failure=true
reporting.verbose.ui.logging=true
# Custom test id attribute
test.id.attribute=data-qa